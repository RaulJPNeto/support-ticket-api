version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: support-ticket-app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    networks:
      - support-network

  nginx:
    image: nginx:stable-alpine
    container_name: support-ticket-nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - support-network

  db:
    image: postgres:16-alpine
    container_name: support-ticket-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: support_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - support-network

networks:
  support-network:

volumes:
  postgres-data: